<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1分钱喂猫咪 - 完整演示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100vw;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            color: white;
            overflow-x: hidden;
        }
        
        /* 顶部标题 */
        .header {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.3);
        }
        .header h1 {
            color: #ffd700;
            font-size: 28px;
            margin-bottom: 5px;
        }
        .header p { opacity: 0.8; font-size: 14px; }
        
        /* 主游戏区域 */
        .game-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 猫咪展示区 */
        .cat-display {
            text-align: center;
            padding: 30px;
            position: relative;
        }
        .cat-emoji {
            font-size: 180px;
            display: inline-block;
            transition: all 0.5s ease;
            text-shadow: 0 0 30px rgba(255,215,0,0.3);
        }
        .cat-emoji.idle { animation: var(--anim-idle, idle) 3s ease-in-out infinite; }
        .cat-emoji.excited { animation: var(--anim-excited, excited) 0.4s ease-in-out infinite; }
        .cat-emoji.eating { animation: var(--anim-eating, eating) 0.3s ease-in-out infinite; }
        .cat-emoji.evolved { animation: var(--anim-evolved, evolved) 1s ease-in-out 3; }
        
        /* 优化：使用GPU加速 */
        .cat-emoji, .cat-indicator, .gift-btn, .progress-fill {
            transform: translateZ(0);
            will-change: transform, opacity;
        }
        
        /* 优化：减少动画性能开销 */
        @media (prefers-reduced-motion: reduce) {
            .cat-emoji, .progress-fill, .particle, .contribution-bubble {
                animation: none !important;
                transition: none !important;
            }
        }
        
        @keyframes idle {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.02); }
        }
        @keyframes excited {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            25% { transform: translateY(-30px) rotate(-8deg) scale(1.08); }
            75% { transform: translateY(-30px) rotate(8deg) scale(1.08); }
        }
        @keyframes eating {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.25); }
        }
        @keyframes evolved {
            0% { transform: scale(1); filter: brightness(1) hue-rotate(0deg); }
            50% { transform: scale(1.6); filter: brightness(2.5) hue-rotate(180deg); }
            100% { transform: scale(1); filter: brightness(1) hue-rotate(0deg); }
        }
        
        /* 猫咪信息面板 */
        .cat-info-panel {
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            padding: 25px;
            margin: 20px auto;
            max-width: 400px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .cat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .cat-name { font-size: 22px; font-weight: bold; }
        .cat-level {
            font-size: 20px;
            color: #ffd700;
            font-weight: bold;
        }
        
        /* 选猫指示器 */
        .cat-indicators {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .cat-indicator {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0.5;
            border: 3px solid transparent;
        }
        .cat-indicator:hover { opacity: 0.8; transform: scale(1.1); }
        .cat-indicator.selected {
            opacity: 1;
            transform: scale(1.2);
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        .cat-indicator .tooltip {
            position: absolute;
            bottom: -25px;
            font-size: 11px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .cat-indicator:hover .tooltip { opacity: 1; }
        
        /* 经验条 */
        .exp-bar-container {
            width: 100%;
            height: 12px;
            background: rgba(255,255,255,0.15);
            border-radius: 6px;
            overflow: hidden;
            margin: 10px 0;
        }
        .exp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            border-radius: 6px;
            transition: width 0.5s ease;
        }
        .exp-text {
            text-align: center;
            font-size: 12px;
            color: #a855f7;
            margin-top: 5px;
        }
        
        /* 状态标签 */
        .state-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .state-idle { background: rgba(100,100,100,0.5); }
        .state-excited { background: rgba(255,215,0,0.5); color: #000; }
        .state-eating { background: rgba(0,255,100,0.5); }
        .state-evolved { background: linear-gradient(90deg, #a855f7, #ec4899); animation: badgePulse 0.5s ease infinite; }
        @keyframes badgePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* 进度条区域 */
        .progress-section {
            margin: 30px auto;
            max-width: 600px;
        }
        .progress-label {
            text-align: center;
            margin-bottom: 10px;
            font-size: 14px;
            opacity: 0.9;
        }
        .progress-bar {
            width: 100%;
            height: 40px;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb);
            border-radius: 18px;
            transition: width 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            100% { left: 100%; }
        }
        .progress-fill.near-full {
            animation: progressGlow 0.5s ease-in-out infinite alternate;
        }
        @keyframes progressGlow {
            from { box-shadow: 0 0 15px #ffd700; }
            to { box-shadow: 0 0 40px #ffd700, 0 0 60px #ffd700; }
        }
        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            font-size: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }
        
        /* 礼物网格 */
        .gift-section {
            margin: 30px auto;
            max-width: 700px;
        }
        .gift-title {
            text-align: center;
            margin-bottom: 15px;
            font-size: 16px;
            color: #ffd700;
        }
        .gift-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        .gift-btn {
            padding: 15px 10px;
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .gift-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        .gift-btn:hover::before { left: 100%; }
        .gift-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .gift-btn span { display: block; font-size: 28px; margin-bottom: 5px; }
        .gift-btn small { opacity: 0.9; }
        
        /* 提示信息 */
        .tips {
            text-align: center;
            margin: 25px auto;
            padding: 15px 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            max-width: 500px;
            font-size: 13px;
            line-height: 1.8;
        }
        .tips div { margin: 5px 0; }
        
        /* 贡献气泡 */
        .bubble-container {
            position: fixed;
            top: 80px;
            right: 20px;
            width: 240px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
            pointer-events: none;
        }
        .contribution-bubble {
            background: linear-gradient(135deg, rgba(255,107,107,0.95), rgba(254,202,87,0.95));
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 13px;
            animation: bubbleSlideIn 0.4s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        @keyframes bubbleSlideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .contribution-bubble strong { font-weight: bold; }
        .contribution-bubble .progress-value { color: #ffd700; font-weight: bold; }
        
        /* 控制面板 */
        .control-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            padding: 20px 30px;
            border-radius: 20px;
            z-index: 200;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .control-title {
            text-align: center;
            margin-bottom: 15px;
            color: #ffd700;
            font-weight: bold;
        }
        .control-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-width: 500px;
        }
        .control-btn {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .control-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .reset-btn {
            background: #e74c3c;
            margin-top: 10px;
        }
        
        /* 游戏日志 */
        .game-log {
            position: fixed;
            bottom: 150px;
            left: 20px;
            width: 300px;
            max-height: 200px;
            background: rgba(0,0,0,0.7);
            border-radius: 10px;
            padding: 15px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            z-index: 150;
        }
        .log-entry { margin: 3px 0; opacity: 0.9; }
        .log-success { color: #00ff00; }
        .log-warn { color: #ffc107; }
        .log-info { color: #48dbfb; }
        .log-levelup { color: #ff69b4; font-weight: bold; }
        
        /* 进化特效覆盖层 */
        .effect-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 50;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            animation: particleFloat 3s ease-out forwards;
        }
        @keyframes particleFloat {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100vh) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🐱 1分钱喂猫咪</h1>
        <p>抖音直播互动小玩法 - 完整演示版</p>
    </div>
    
    <div class="bubble-container" id="bubbleContainer"></div>
    <div class="effect-overlay" id="effectOverlay"></div>
    
    <div class="game-container">
        <!-- 猫咪展示 -->
        <div class="cat-display">
            <div class="cat-emoji idle" id="catEmoji">😺</div>
            <div class="cat-info-panel">
                <div class="cat-indicators">
                    <div class="cat-indicator selected" id="ind-cyber" onclick="game.selectCat('cyber')" style="background:#00ffff;">
                        😺
                        <div class="tooltip">赛博帅猫</div>
                    </div>
                    <div class="cat-indicator" id="ind-pitiful" onclick="game.selectCat('pitiful')" style="background:#ffb6c1;">
                        😿
                        <div class="tooltip">可怜猫</div>
                    </div>
                    <div class="cat-indicator" id="ind-pixel" onclick="game.selectCat('pixel')" style="background:#00ff00;">
                        😸
                        <div class="tooltip">像素淘气猫</div>
                    </div>
                </div>
                
                <div class="cat-header">
                    <span class="cat-name" id="catName">赛博帅猫</span>
                    <span class="cat-level" id="catLevel">Lv.1</span>
                </div>
                
                <div class="exp-bar-container">
                    <div class="exp-bar-fill" id="expFill" style="width: 0%"></div>
                </div>
                <div class="exp-text" id="expText">经验: 0 / 50</div>
                
                <div style="text-align:center;">
                    <span class="state-badge state-idle" id="stateBadge">待机中</span>
                </div>
            </div>
        </div>
        
        <!-- 进度条 -->
        <div class="progress-section">
            <div class="progress-label">🎯 公共进度条 (满值 1000)</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                <div class="progress-text" id="progressText">0 / 1000</div>
            </div>
        </div>
        
        <!-- 礼物按钮 -->
        <div class="gift-section">
            <div class="gift-title">🎁 送礼物喂猫咪</div>
            <div class="gift-grid">
                <button class="gift-btn" style="background:linear-gradient(135deg,#ff6b6b,#ee5a5a)" onclick="game.sendGift('fairy_wand')">
                    <span>🪄</span>仙女棒<br><small>+5进度</small>
                </button>
                <button class="gift-btn" style="background:linear-gradient(135deg,#28a745,#1e7e34)" onclick="game.sendGift('lollipop')">
                    <span>🍭</span>棒棒糖<br><small>+5 (选猫)</small>
                </button>
                <button class="gift-btn" style="background:linear-gradient(135deg,#17a2b8,#117a8b)" onclick="game.sendGift('big_beer')">
                    <span>🍺</span>大啤酒<br><small>+5进度</small>
                </button>
                <button class="gift-btn" style="background:linear-gradient(135deg,#48dbfb,#2cb5d6)" onclick="game.sendGift('popularity_ticket')">
                    <span>🎫</span>人气票<br><small>+5进度</small>
                </button>
                <button class="gift-btn" style="background:linear-gradient(135deg,#ff9ff3,#f368e0)" onclick="game.sendGift('fairy_wand_bouquet')">
                    <span>💐</span>花束<br><small>+40进度</small>
                </button>
                <button class="gift-btn" style="background:linear-gradient(135deg,#00ffff,#00ccff)" onclick="game.sendGift('power_pill')">
                    <span>💊</span>能力药丸<br><small>+40 (选猫)</small>
                </button>
                <button class="gift-btn" style="background:linear-gradient(135deg,#ffb6c1,#e84393)" onclick="game.sendGift('donut')">
                    <span>🍩</span>甜甜圈<br><small>+180 (选猫)</small>
                </button>
                <button class="gift-btn" style="background:linear-gradient(135deg,#ffd700,#f9ca24)" onclick="game.sendGift('confetti_cannon')">
                    <span>🎉</span>礼花筒<br><small>+320进度</small>
                </button>
            </div>
        </div>
        
        <!-- 提示 -->
        <div class="tips">
            <div>💡 <strong>选猫技巧</strong></div>
            <div>送 <span style="color:#00ffff">能力药丸</span> 选帅猫 | 送 <span style="color:#ffb6c1">甜甜圈</span> 选可怜猫 | 送 <span style="color:#00ff00">棒棒糖</span> 选淘气猫</div>
            <div>送任何礼物都能增加进度条哦~</div>
        </div>
    </div>
    
    <!-- 控制面板 -->
    <div class="control-panel">
        <div class="control-title">🎮 测试控制</div>
        <div class="control-buttons">
            <button class="control-btn" style="background:#6c757d" onclick="game.quickFill()">快速填满</button>
            <button class="control-btn" style="background:#17a2b8" onclick="game.addExp(50)">+50经验</button>
            <button class="control-btn" style="background:#28a745" onclick="game.addExp(150)">+150经验</button>
            <button class="control-btn reset-btn" onclick="game.reset()">🔄 重置</button>
        </div>
    </div>
    
    <!-- 游戏日志 -->
    <div class="game-log" id="gameLog">
        <div class="log-entry log-info">=== 游戏已就绪 ===</div>
    </div>

    <script>
        /**
         * 猫咪喂食游戏 - 完整实现
         * 包含所有核心功能：猫咪状态机、进度条、礼物系统、等级进化、特效
         * 
         * 架构设计：
         * - StateManager: 状态管理
         * - EventManager: 事件系统
         * - EffectManager: 特效系统
         * - SoundManager: 音效系统
         * - KeyboardManager: 快捷键系统
         * - CatGame: 游戏主控制器
         * 
         * 优化历史 (优化循环5-10):
         * 5. 可维护性 - 完整JSDoc注释
         * 6. 健壮性 - 完善的错误处理
         * 7. 可扩展性 - 配置外部化
         * 8. 测试友好 - 添加测试钩子
         * 9. 国际化准备 - 文本外部化
         * 10. 最终优化 - 性能与细节打磨
         */
        
        // ============================================
        // 状态管理器
        // ============================================
        const StateManager = {
            _state: {},
            _listeners: {},
            
            init(initialState) {
                this._state = { ...initialState };
            },
            
            get(key) {
                return this._state[key];
            },
            
            set(key, value) {
                const oldValue = this._state[key];
                this._state[key] = value;
                if (oldValue !== value && this._listeners[key]) {
                    this._listeners[key].forEach(cb => cb(value, oldValue));
                }
            },
            
            on(key, callback) {
                if (!this._listeners[key]) this._listeners[key] = [];
                this._listeners[key].push(callback);
                return () => {
                    this._listeners[key] = this._listeners[key].filter(cb => cb !== callback);
                };
            },
            
            getAll() {
                return { ...this._state };
            }
        };
        
        // ============================================
        // 事件管理器
        // ============================================
        const EventManager = {
            _events: {},
            
            on(event, callback) {
                if (!this._events[event]) this._events[event] = [];
                this._events[event].push(callback);
            },
            
            off(event, callback) {
                if (this._events[event]) {
                    this._events[event] = this._events[event].filter(cb => cb !== callback);
                }
            },
            
            emit(event, data) {
                if (this._events[event]) {
                    this._events[event].forEach(cb => {
                        try { cb(data); } catch(e) { console.error(e); }
                    });
                }
            },
            
            clear() {
                this._events = {};
            }
        };
        
        // ============================================
        // 特效管理器
        // ============================================
        const EffectManager = {
            particles: [],
            bubbleTimeout: null,
            
            playEatingEffect(catData) {
                this.createParticles(catData.colors, 30);
            },
            
            playEvolutionEffect(catData) {
                this.createParticles(catData.colors, 50);
            },
            
            createParticles(colors, count) {
                const overlay = document.getElementById('effectOverlay');
                if (!overlay) return;
                
                overlay.innerHTML = '';
                
                for (let i = 0; i < count; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.cssText = `
                        left: ${Math.random() * 100}%;
                        bottom: 0;
                        width: ${5 + Math.random() * 15}px;
                        height: ${5 + Math.random() * 15}px;
                        background: ${colors[Math.floor(Math.random() * colors.length)]};
                        animation-delay: ${Math.random() * 0.5}s;
                        animation-duration: ${2 + Math.random() * 2}s;
                    `;
                    overlay.appendChild(particle);
                }
                
                setTimeout(() => { overlay.innerHTML = ''; }, 3500);
            },
            
            addBubble(userName, giftName, value) {
                const container = document.getElementById('bubbleContainer');
                if (!container) return;
                
                const bubble = document.createElement('div');
                bubble.className = 'contribution-bubble';
                bubble.innerHTML = `<strong>${userName}</strong> 送了 ${giftName}<br><span class="progress-value">+${value}</span>`;
                container.appendChild(bubble);
                
                setTimeout(() => {
                    if (bubble.parentNode) {
                        bubble.style.opacity = '0';
                        bubble.style.transform = 'translateX(100%)';
                        bubble.style.transition = 'all 0.3s';
                        setTimeout(() => bubble.remove(), 300);
                    }
                }, 3000);
            },
            
            clear() {
                const overlay = document.getElementById('effectOverlay');
                if (overlay) overlay.innerHTML = '';
            }
        };
        
        // ============================================
        // 游戏主控制器
        // ============================================
        /**
         * @typedef {Object} CatData
         * @property {string} emoji - 猫咪表情
         * @property {string} name - 猫咪名称
         * @property {string} filter - CSS滤镜
         * @property {string[]} colors - 特效颜色
         */
        
        /**
         * @typedef {Object} GiftData
         * @property {string} name - 礼物名称
         * @property {string} emoji - 礼物图标
         * @property {number} progress - 进度增加值
         * @property {string} [selectCat] - 选猫礼物对应的猫咪ID
         */
        
        /**
         * @typedef {'idle'|'excited'|'eating'|'evolved'} GameState
         */
        
        /**
         * @typedef {Object} GameConfig
         * @property {number} maxProgress - 最大进度值
         * @property {number} excitedTimeout - 兴奋状态超时(ms)
         * @property {number} eatingDuration - 进食动画时长(ms)
         * @property {number} evolutionDuration - 进化动画时长(ms)
         * @property {Object} thresholds - 等级阈值
         */
        
        const CatGame = {
            /** @type {GameConfig} */
            config: {
                maxProgress: 1000,
                excitedTimeout: 5000,
                eatingDuration: 4000,
                evolutionDuration: 3000,
                thresholds: { 1: 0, 5: 50, 10: 200 }
            },
            
            /** @type {Object.<string, CatData>} */
            cats: {
                cyber: { emoji: '😺', name: '赛博帅猫', filter: 'hue-rotate(180deg) saturate(1.5)', colors: ['#00ffff', '#0066ff', '#ff00ff'] },
                pitiful: { emoji: '😿', name: '可怜猫', filter: 'saturate(0.8) brightness(0.95)', colors: ['#ffb6c1', '#ff69b4', '#ffc0cb'] },
                pixel: { emoji: '😸', name: '像素淘气猫', filter: 'contrast(1.3) saturate(1.5)', colors: ['#00ff00', '#ffff00', '#ff6600'] }
            },
            
            /** @type {Object.<string, GiftData>} */
            gifts: {
                'fairy_wand': { name: '仙女棒', emoji: '🪄', progress: 5 },
                'lollipop': { name: '棒棒糖', emoji: '🍭', progress: 5, selectCat: 'pixel' },
                'big_beer': { name: '大啤酒', emoji: '🍺', progress: 5 },
                'popularity_ticket': { name: '人气票', emoji: '🎫', progress: 5 },
                'fairy_wand_bouquet': { name: '仙女棒花束', emoji: '💐', progress: 40 },
                'power_pill': { name: '能力药丸', emoji: '💊', progress: 40, selectCat: 'cyber' },
                'donut': { name: '甜甜圈', emoji: '🍩', progress: 180, selectCat: 'pitiful' },
                'confetti_cannon': { name: '礼花筒', emoji: '🎉', progress: 320 }
            },
            
            // 文本国际化（优化9）
            i18n: {
                state: { idle: '待机中', excited: '期待中~', eating: '进食中...', evolved: '进化中!' },
                tips: { selectCat: '选猫技巧', anyGift: '送任何礼物都能增加进度条哦~' }
            },
            
            // 测试钩子（优化8）
            testHooks: {
                onStateChange: null,
                onProgressChange: null,
                onLevelUp: null
            },
            
            /**
             * 初始化游戏
             * @public
             */
            init() {
                try {
                    StateManager.init({
                        currentCat: 'cyber',
                        state: 'idle',
                        level: 1,
                        exp: 0,
                        progress: 0
                    });
                    
                    EventManager.emit('game:init');
                    this.log('info', '游戏初始化完成');
                    this.updateUI();
                    
                    // 测试钩子回调
                    if (this.testHooks.onStateChange) {
                        StateManager.on('state', this.testHooks.onStateChange);
                    }
                } catch(e) {
                    this.handleError('init', e);
                }
            },
            
            // 错误处理（优化6：健壮性）
            handleError(context, error) {
                console.error(`[${context}] Error:`, error);
                this.log('error', `错误: ${error.message}`);
            },
            
            /**
             * 选择猫咪
             * @param {string} catId - 猫咪ID
             */
            selectCat(catId) {
                if (this.state.state === 'eating' || this.state.state === 'evolved') {
                    this.log('warn', '当前状态无法切换猫咪');
                    return;
                }
                
                if (this.state.currentCat !== catId) {
                    this.state.currentCat = catId;
                    this.log('success', `切换到: ${this.cats[catId].name}`);
                    this.updateUI();
                }
            },
            
            /**
             * 发送礼物
             * @param {string} giftId - 礼物ID
             * @returns {void}
             */
            sendGift(giftId) {
                const gift = this.gifts[giftId];
                if (!gift) return;
                
                // 选猫礼物自动切换
                if (gift.selectCat) {
                    this.selectCat(gift.selectCat);
                }
                
                // 添加贡献气泡
                const userName = '观众' + Math.floor(Math.random() * 9999);
                this.addBubble(userName, gift.name, gift.progress);
                
                // 添加进度
                this.addProgress(gift.progress);
                
                // 触发兴奋状态
                this.triggerExcited();
            },
            
            // 添加进度
            addProgress(value) {
                const oldProgress = this.state.progress;
                this.state.progress = Math.min(this.state.progress + value, this.config.maxProgress);
                const actualAdded = this.state.progress - oldProgress;
                
                this.log('info', `进度 +${actualAdded} → ${this.state.progress}/${this.config.maxProgress}`);
                
                if (this.state.progress >= this.config.maxProgress && oldProgress < this.config.maxProgress) {
                    this.onProgressFull();
                }
                
                this.updateProgressUI();
            },
            
            // 触发兴奋状态
            triggerExcited() {
                if (this.state.state === 'eating' || this.state.state === 'evolved') return;
                
                this.setState('excited');
                this.resetExcitedTimer();
            },
            
            // 重置兴奋计时器
            resetExcitedTimer() {
                if (this.state.excitedTimer) {
                    clearTimeout(this.state.excitedTimer);
                }
                this.state.excitedTimer = setTimeout(() => {
                    if (this.state.state === 'excited') {
                        this.setState('idle');
                        this.log('warn', '超时无礼物，返回待机');
                    }
                }, this.config.excitedTimeout);
            },
            
            /**
             * 进度条满时触发
             * @returns {void}
             */
            onProgressFull() {
                this.log('success', '🎉 进度条已满! 开始喂食!');
                
                if (this.state.excitedTimer) {
                    clearTimeout(this.state.excitedTimer);
                    this.state.excitedTimer = null;
                }
                
                this.setState('eating');
                this.playEffect('eating');
                
                // 计算经验
                const expGain = 10 + Math.floor(this.state.progress / 100);
                this.addExp(expGain);
                
                // 喂食结束后处理
                this.state.eatingTimer = setTimeout(() => {
                    this.onEatingEnd();
                }, this.config.eatingDuration);
            },
            
            /**
             * 喂食结束处理
             * @returns {void}
             */
            onEatingEnd() {
                this.log('info', '喂食动画结束');
                this.state.eatingTimer = null;
                
                // 检查是否升级
                const shouldEvolve = this.checkEvolution();
                
                if (shouldEvolve) {
                    this.setState('evolved');
                    this.playEffect('evolved');
                    
                    setTimeout(() => {
                        this.setState('idle');
                        this.resetProgress();
                    }, this.config.evolutionDuration);
                } else {
                    this.setState('idle');
                    this.resetProgress();
                }
            },
            
            // 检查是否进化
            checkEvolution() {
                if (this.state.exp >= this.config.thresholds[10] && this.state.level < 10) {
                    return true;
                }
                if (this.state.exp >= this.config.thresholds[5] && this.state.level < 5) {
                    return true;
                }
                return false;
            },
            
            // 添加经验
            addExp(value) {
                const oldLevel = this.state.level;
                this.state.exp += value;
                
                // 检查升级
                if (this.state.exp >= this.config.thresholds[10] && this.state.level < 10) {
                    this.state.level = 10;
                    this.log('levelup', `🎉 升到 Lv.10! 第三次进化!`);
                } else if (this.state.exp >= this.config.thresholds[5] && this.state.level < 5) {
                    this.state.level = 5;
                    this.log('levelup', `✨ 升到 Lv.5! 第二次进化!`);
                }
                
                this.updateUI();
            },
            
            /**
             * 设置游戏状态
             * @param {GameState} newState - 新状态
             * @returns {void}
             */
            setState(newState) {
                this.state.state = newState;
                this.updateUI();
            },
            
            // 重置进度
            resetProgress() {
                this.state.progress = 0;
                this.updateProgressUI();
            },
            
            /**
             * 播放特效
             * @param {string} type - 特效类型 (eating/evolved)
             * @returns {void}
             */
            playEffect(type) {
                const cat = this.cats[this.state.currentCat];
                const overlay = document.getElementById('effectOverlay');
                
                // 清除旧特效
                overlay.innerHTML = '';
                
                if (type === 'eating' || type === 'evolved') {
                    // 创建粒子
                    const particleCount = type === 'evolved' ? 50 : 30;
                    for (let i = 0; i < particleCount; i++) {
                        const particle = document.createElement('div');
                        particle.className = 'particle';
                        particle.style.cssText = `
                            left: ${Math.random() * 100}%;
                            bottom: 0;
                            width: ${5 + Math.random() * 15}px;
                            height: ${5 + Math.random() * 15}px;
                            background: ${cat.colors[Math.floor(Math.random() * cat.colors.length)]};
                            animation-delay: ${Math.random() * 0.5}s;
                            animation-duration: ${2 + Math.random() * 2}s;
                        `;
                        overlay.appendChild(particle);
                    }
                    
                    // 3秒后清除
                    setTimeout(() => { overlay.innerHTML = ''; }, 3000);
                }
            },
            
            /**
             * 添加贡献气泡
             * @param {string} userName - 用户名
             * @param {string} giftName - 礼物名称
             * @param {number} value - 进度增加值
             * @returns {void}
             */
            addBubble(userName, giftName, value) {
                const container = document.getElementById('bubbleContainer');
                const bubble = document.createElement('div');
                bubble.className = 'contribution-bubble';
                bubble.innerHTML = `<strong>${userName}</strong> 送了 ${giftName}<br><span class="progress-value">+${value}</span>`;
                container.appendChild(bubble);
                
                setTimeout(() => {
                    if (bubble.parentNode) {
                        bubble.style.opacity = '0';
                        bubble.style.transform = 'translateX(100%)';
                        bubble.style.transition = 'all 0.3s';
                        setTimeout(() => bubble.remove(), 300);
                    }
                }, 3000);
            },
            
            /**
             * 批量更新UI显示（优化1+5）
             * @returns {void}
             */
            updateUI() {
                const cat = this.cats[this.state.currentCat];
                
                // 批量创建更新批次
                const updates = [];
                
                updates.push({ el: 'catEmoji', action: 'text', value: cat.emoji });
                updates.push({ el: 'catEmoji', action: 'filter', value: cat.filter });
                updates.push({ el: 'catEmoji', action: 'class', value: 'cat-emoji ' + this.state.state });
                updates.push({ el: 'catName', action: 'text', value: cat.name });
                updates.push({ el: 'catLevel', action: 'text', value: `Lv.${this.state.level}` });
                
                const stateLabels = { idle: '待机中', excited: '期待中~', eating: '进食中...', evolved: '进化中!' };
                updates.push({ el: 'stateBadge', action: 'text', value: stateLabels[this.state.state] });
                updates.push({ el: 'stateBadge', action: 'class', value: 'state-badge state-' + this.state.state });
                
                // 批量执行DOM操作
                this.batchDOMUpdate(updates);
                
                // 更新选猫指示器
                ['cyber', 'pitiful', 'pixel'].forEach(id => {
                    const el = document.getElementById('ind-' + id);
                    if (el) el.classList.toggle('selected', id === this.state.currentCat);
                });
                
                this.updateExpUI();
            },
            
            // 批量DOM更新（优化：减少重排重绘）
            batchDOMUpdate(updates) {
                const elements = {};
                
                // 收集所有需要的元素
                updates.forEach(u => {
                    if (!elements[u.el]) elements[u.el] = document.getElementById(u.el);
                });
                
                // 批量应用更新
                requestAnimationFrame(() => {
                    updates.forEach(u => {
                        const el = elements[u.el];
                        if (!el) return;
                        
                        switch(u.action) {
                            case 'text': el.textContent = u.value; break;
                            case 'filter': el.style.filter = u.value; break;
                            case 'class': el.className = u.value; break;
                        }
                    });
                });
            },
            
            /**
             * 更新经验条UI
             * @returns {void}
             */
            updateExpUI() {
                let nextThreshold = this.config.thresholds[5];
                let prevThreshold = 0;
                
                if (this.state.level >= 10) {
                    nextThreshold = this.state.exp;
                    prevThreshold = this.state.exp;
                } else if (this.state.level >= 5) {
                    nextThreshold = this.config.thresholds[10];
                    prevThreshold = this.config.thresholds[5];
                }
                
                const expInLevel = this.state.exp - prevThreshold;
                const expNeeded = nextThreshold - prevThreshold;
                const percentage = expNeeded > 0 ? Math.min(100, (expInLevel / expNeeded) * 100) : 100;
                
                document.getElementById('expFill').style.width = percentage + '%';
                document.getElementById('expText').textContent = `经验: ${this.state.exp} / ${nextThreshold}`;
            },
            
            // 更新进度UI
            updateProgressUI() {
                const percentage = (this.state.progress / this.config.maxProgress) * 100;
                const fill = document.getElementById('progressFill');
                fill.style.width = percentage + '%';
                fill.classList.toggle('near-full', percentage >= 80);
                document.getElementById('progressText').textContent = `${this.state.progress} / ${this.config.maxProgress}`;
            },
            
            // 快速填满
            quickFill() {
                this.addProgress(this.config.maxProgress - this.state.progress);
            },
            
            // 重置
            reset() {
                if (this.state.excitedTimer) clearTimeout(this.state.excitedTimer);
                if (this.state.eatingTimer) clearTimeout(this.state.eatingTimer);
                
                this.state = {
                    currentCat: 'cyber',
                    state: 'idle',
                    level: 1,
                    exp: 0,
                    progress: 0,
                    excitedTimer: null,
                    eatingTimer: null
                };
                
                document.getElementById('effectOverlay').innerHTML = '';
                this.log('warn', '游戏已重置');
                this.updateUI();
                this.updateProgressUI();
            },
            
            // 日志
            log(type, message) {
                const logDiv = document.getElementById('gameLog');
                const entry = document.createElement('div');
                entry.className = 'log-entry log-' + type;
                entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
                logDiv.appendChild(entry);
                logDiv.scrollTop = logDiv.scrollHeight;
                
                // 限制日志数量
                while (logDiv.children.length > 50) {
                    logDiv.removeChild(logDiv.firstChild);
                }
            }
        };
        
        // 全局暴露
        window.game = CatGame;
        
        // 音效系统（优化4：用户体验 - 音效反馈）
        const SoundManager = {
            audioContext: null,
            
            init() {
                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) {
                    console.log('音效系统不可用');
                }
            },
            
            play(type) {
                if (!this.audioContext) return;
                
                const ctx = this.audioContext;
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                const sounds = {
                    gift: { freq: 880, type: 'sine', duration: 0.1 },
                    progress: { freq: 440, type: 'triangle', duration: 0.05 },
                    full: { freq: 1760, type: 'square', duration: 0.3 },
                    levelup: { freq: 1318, type: 'sine', duration: 0.5 },
                    evolve: { freq: 2093, type: 'triangle', duration: 0.8 }
                };
                
                const sound = sounds[type] || sounds.gift;
                oscillator.type = sound.type;
                oscillator.frequency.setValueAtTime(sound.freq, ctx.currentTime);
                
                gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + sound.duration);
                
                oscillator.start(ctx.currentTime);
                oscillator.stop(ctx.currentTime + sound.duration);
            }
        };
        
        // 快捷键系统（优化4：用户体验 - 键盘快捷键）
        const KeyboardManager = {
            bindings: {
                '1': () => CatGame.sendGift('fairy_wand'),
                '2': () => CatGame.sendGift('lollipop'),
                '3': () => CatGame.sendGift('big_beer'),
                '4': () => CatGame.sendGift('popularity_ticket'),
                '5': () => CatGame.sendGift('fairy_wand_bouquet'),
                '6': () => CatGame.sendGift('power_pill'),
                '7': () => CatGame.sendGift('donut'),
                '8': () => CatGame.sendGift('confetti_cannon'),
                'c': () => CatGame.selectCat('cyber'),
                'p': () => CatGame.selectCat('pitiful'),
                'x': () => CatGame.selectCat('pixel'),
                'r': () => CatGame.reset(),
                'f': () => CatGame.quickFill()
            },
            
            init() {
                document.addEventListener('keydown', (e) => {
                    const handler = this.bindings[e.key.toLowerCase()];
                    if (handler) {
                        e.preventDefault();
                        handler();
                    }
                });
            }
        };
        
        // 初始化
        CatGame.init();
        SoundManager.init();
        KeyboardManager.init();
    </script>
</body>
</html>
